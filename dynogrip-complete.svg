const state = {
  parts: [],
  device: 'All',
  category: 'All',
  query: ''
};

const els = {
  deviceGrid: document.querySelector('#deviceGrid'),
  deviceChips: document.querySelector('#deviceChips'),
  categoryChips: document.querySelector('#categoryChips'),
  partsGrid: document.querySelector('#partsGrid'),
  searchInput: document.querySelector('#searchInput'),
  resultCount: document.querySelector('#resultCount'),
  resetFilters: document.querySelector('#resetFilters'),
  emptyState: document.querySelector('#emptyState'),
  heroPartCount: document.querySelector('#heroPartCount'),
  dialog: document.querySelector('#partDialog'),
  dialogContent: document.querySelector('#dialogContent'),
  dialogClose: document.querySelector('#dialogClose')
};

const categoryOrder = ['All', 'Complete Model', 'Grips', 'Attachments', 'Modified Grips', 'Spare Parts', 'Legacy'];

init();

async function init() {
  const response = await fetch('data/parts.json');
  state.parts = await response.json();
  els.heroPartCount.textContent = String(state.parts.length);
  renderDevices();
  renderChips();
  renderParts();
  bindEvents();
}

function bindEvents() {
  els.searchInput.addEventListener('input', (event) => {
    state.query = event.target.value.trim().toLowerCase();
    renderParts();
  });

  els.resetFilters.addEventListener('click', () => {
    state.device = 'All';
    state.category = 'All';
    state.query = '';
    els.searchInput.value = '';
    renderChips();
    renderParts();
  });

  els.dialogClose.addEventListener('click', () => els.dialog.close());
  els.dialog.addEventListener('click', (event) => {
    if (event.target === els.dialog) els.dialog.close();
  });
}

function unique(values) {
  return [...new Set(values)].filter(Boolean);
}

function renderDevices() {
  const devices = unique(state.parts.map(part => part.device)).map(device => {
    const parts = state.parts.filter(part => part.device === device);
    const categories = unique(parts.map(part => part.category));
    return { device, parts, categories };
  });

  els.deviceGrid.innerHTML = devices.map(item => `
    <article class="device-card">
      <h3>${item.device}</h3>
      <p>${item.device === 'DynoGrip'
        ? 'Komplette Modelle, Griffe, Attachments und modifizierte Griffvarianten.'
        : 'Gehäuse, Attachments und Ersatzteile für Pull- und Zugkraft-Setups.'}</p>
      <div class="device-meta">
        <span class="pill">${item.parts.length} Teile</span>
        <span class="pill">${item.categories.length} Kategorien</span>
        <a class="pill" href="#downloads" data-device-link="${item.device}">Downloads ansehen →</a>
      </div>
    </article>
  `).join('');

  document.querySelectorAll('[data-device-link]').forEach(link => {
    link.addEventListener('click', () => {
      state.device = link.dataset.deviceLink;
      state.category = 'All';
      renderChips();
      renderParts();
    });
  });
}

function renderChips() {
  const devices = ['All', ...unique(state.parts.map(part => part.device))];
  const categories = categoryOrder.filter(category => category === 'All' || state.parts.some(part => part.category === category));
  els.deviceChips.innerHTML = devices.map(device => chipTemplate('device', device, state.device === device)).join('');
  els.categoryChips.innerHTML = categories.map(category => chipTemplate('category', category, state.category === category)).join('');

  document.querySelectorAll('[data-chip-type]').forEach(chip => {
    chip.addEventListener('click', () => {
      state[chip.dataset.chipType] = chip.dataset.value;
      renderChips();
      renderParts();
    });
  });
}

function chipTemplate(type, value, active) {
  return `<button class="chip ${active ? 'active' : ''}" type="button" data-chip-type="${type}" data-value="${value}">${value}</button>`;
}

function filteredParts() {
  return state.parts.filter(part => {
    const matchesDevice = state.device === 'All' || part.device === state.device;
    const matchesCategory = state.category === 'All' || part.category === state.category;
    const haystack = `${part.title} ${part.device} ${part.category} ${part.description} ${part.tags.join(' ')}`.toLowerCase();
    const matchesQuery = !state.query || haystack.includes(state.query);
    return matchesDevice && matchesCategory && matchesQuery;
  });
}

function renderParts() {
  const parts = filteredParts();
  els.resultCount.textContent = `${parts.length} ${parts.length === 1 ? 'Teil' : 'Teile'}`;
  els.emptyState.hidden = parts.length !== 0;

  els.partsGrid.innerHTML = parts.map(part => `
    <article class="part-card">
      <img class="part-preview" src="${part.preview}" alt="${part.title} preview" loading="lazy">
      <div class="part-body">
        <div class="part-kicker">
          <span>${part.device}</span>
          <span>${part.version}</span>
        </div>
        <div>
          <h3 class="part-title">${part.title}</h3>
          <p class="part-description">${part.description}</p>
        </div>
        <div class="badges">
          <span class="badge">${part.category}</span>
          <span class="badge status-${part.status.toLowerCase()}">${part.status}</span>
          <span class="badge">${part.material}</span>
        </div>
        <div class="download-row">
          <a class="download-link step" href="${part.files.step}" download>STEP</a>
          <a class="download-link stl" href="${part.files.stl}" download>STL</a>
          <button class="details-button" type="button" aria-label="Details for ${part.title}" data-part-id="${part.id}">i</button>
        </div>
      </div>
    </article>
  `).join('');

  document.querySelectorAll('[data-part-id]').forEach(button => {
    button.addEventListener('click', () => openPartDialog(button.dataset.partId));
  });
}

function openPartDialog(id) {
  const part = state.parts.find(item => item.id === id);
  if (!part) return;

  els.dialogContent.innerHTML = `
    <div class="dialog-layout">
      <img src="${part.preview}" alt="${part.title} preview">
      <div class="dialog-copy">
        <p class="eyebrow">${part.device} · ${part.category}</p>
        <h2>${part.title}</h2>
        <p>${part.longDescription || part.description}</p>
        <dl class="dialog-specs">
          <div><dt>Version</dt><dd>${part.version}</dd></div>
          <div><dt>Status</dt><dd>${part.status}</dd></div>
          <div><dt>Kompatibilität</dt><dd>${part.compatibility}</dd></div>
          <div><dt>Material</dt><dd>${part.material}</dd></div>
          <div><dt>Schwierigkeit</dt><dd>${part.difficulty}</dd></div>
          <div><dt>Aktualisiert</dt><dd>${part.updated}</dd></div>
        </dl>
        <div class="hero-actions">
          <a class="button primary" href="${part.files.step}" download>STEP herunterladen</a>
          <a class="button ghost" href="${part.files.stl}" download>STL herunterladen</a>
        </div>
      </div>
    </div>
  `;

  els.dialog.showModal();
}
